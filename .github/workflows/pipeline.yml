name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  fog_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        working-directory: ./flask
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip wget jq

      - name: Install Java 17
        run: |
          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb
          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb
          java -version

      - name: Create Deployment Package
        run: |
          cd flask
          zip -r ../deploy.zip . \
            -x "*.git*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "*.pyo" \
            -x "*.DS_Store"

      - name: Upload Deployment Package
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.zip
          retention-days: 7

  fog_deploy:
    runs-on: ubuntu-latest
    needs: fog_build

    steps:
      - name: Download Deployment Package
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          application_name: fog-x25105990-eb
          environment_name: Fog-x25105990-eb-env
          region: us-east-1
          version_label: flask-build-${{ github.run_number }}
          deployment_package: deploy.zip
          wait_for_deployment: false